version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:3501
    depends_on:
      - backend
    networks:
      - twitch-sync-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3501:3501"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=twitchsync
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      # Must match the redirect URL registered in the Twitch Developer Console
      # For homelab: replace with your server IP or domain
      # e.g. http://192.168.1.100:3501/auth/twitch/callback
      - TWITCH_REDIRECT_URI=${TWITCH_REDIRECT_URI}
      - JWT_SECRET=${JWT_SECRET}
      # Path inside the container where VODs are saved
      # Change the host-side path (left of :) to your storage location
      - STORAGE_PATH=/data/vods
    volumes:
      # ⬇ Change /your/homelab/storage/vods to wherever you want VODs stored
      - /your/homelab/storage/vods:/data/vods
    depends_on:
      - db
    networks:
      - twitch-sync-network

  db:
    image: postgres:14-alpine
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=twitchsync
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - twitch-sync-network

networks:
  twitch-sync-network:
    driver: bridge

volumes:
  postgres_data:

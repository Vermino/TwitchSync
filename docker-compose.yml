version: '3.8'

# TwitchSync Docker Compose
#
# Quick start:
#   cp .env.example .env
#   # Edit .env — set your Twitch credentials, JWT_SECRET, and storage path
#   docker compose up -d --build
#
# Access:
#   Web UI + API: http://YOUR_SERVER_IP:2261   (nginx on port 2261)

services:

  # ── Frontend (nginx) ────────────────────────────────────────────────────────
  # Serves the React app and proxies /api, /auth, /socket.io to the backend.
  # This means the browser only ever talks to one URL — no CORS issues.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "2261:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - twitchsync-net

  # ── Backend (Node / Express) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DB_HOST=db
    volumes:
      # VOD storage — change the left side to your host path
      # e.g. /mnt/media/TwitchSync:/data/vods
      - ${VOD_STORAGE_HOST_PATH:-./vod-storage}:/data/vods
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3501/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - twitchsync-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:14-alpine
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_NAME:-twitchsync}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-twitchsync}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - twitchsync-net

networks:
  twitchsync-net:
    driver: bridge

volumes:
  postgres_data:
